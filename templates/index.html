<!DOCTYPE html>
<html>

<head>
    <title>Volleyball Team Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-600 via-blue-500 to-indigo-600 min-h-screen text-white">

    <div class="max-w-4xl mx-auto p-6">

        <h1 class="text-4xl font-bold text-center mb-6">🏐 Team Generator</h1>

        <!-- ADD PLAYER -->
        <div class="bg-white text-black p-4 rounded-xl mb-6">
            <h2 class="text-xl font-semibold mb-3">Add Player</h2>

            <input id="name" class="border p-2 rounded w-full mb-2" placeholder="Player Name">
            <input id="rating" type="number" class="border p-2 rounded w-full mb-2" placeholder="Rating (0-100)">

            <button onclick="addPlayer()" class="bg-purple-600 text-white px-4 py-2 rounded w-full">
                Add Player
            </button>
        </div>

        <!-- PLAYER LIST -->
        <div id="players" class="grid grid-cols-2 gap-3 mb-6"></div>

        <!-- GENERATE BUTTON -->
        <button onclick="generateTeams()" class="w-full bg-green-500 p-3 rounded text-lg">
            Generate Teams ⚡
        </button>

        <!-- OUTPUT -->
        <div class="grid grid-cols-2 gap-6 mt-6">
            <div>
                <h2 class="text-xl font-bold">Team A</h2>
                <div id="teamA"></div>
            </div>
            <div>
                <h2 class="text-xl font-bold">Team B</h2>
                <div id="teamB"></div>
            </div>
        </div>

    </div>

    <script>
        let players = [];

        function addPlayer() {
            let name = document.getElementById("name").value;
            let rating = parseInt(document.getElementById("rating").value);

            if (!name || !rating) {
                alert("Enter valid details");
                return;
            }

            players.push({ name, rating });

            document.getElementById("name").value = "";
            document.getElementById("rating").value = "";

            displayPlayers();
        }

        function displayPlayers() {
            let container = document.getElementById("players");
            container.innerHTML = "";

            players.forEach((p, i) => {
                container.innerHTML += `
                    <label class="bg-white text-black p-3 rounded cursor-pointer">
                        <input type="checkbox" value="${i}" class="mr-2">
                        ${p.name} (${p.rating})
                    </label>
                `;
            });
        }

        function generateTeams() {
            let checkboxes = document.querySelectorAll("#players input:checked");

            if (checkboxes.length < 2) {
                alert("Select at least 2 players");
                return;
            }

            let selected = [];

            checkboxes.forEach(cb => {
                selected.push(players[cb.value]);
            });

            // Shuffle
            selected.sort(() => Math.random() - 0.5);

            let teamA = [];
            let teamB = [];

            selected.forEach((p, i) => {
                if (i % 2 === 0) teamA.push(p);
                else teamB.push(p);
            });

            displayTeams(teamA, teamB);
        }

        function displayTeams(teamA, teamB) {
            let aDiv = document.getElementById("teamA");
            let bDiv = document.getElementById("teamB");

            aDiv.innerHTML = "";
            bDiv.innerHTML = "";

            teamA.forEach(p => {
                aDiv.innerHTML += `<p>${p.name} (${p.rating})</p>`;
            });

            teamB.forEach(p => {
                bDiv.innerHTML += `<p>${p.name} (${p.rating})</p>`;
            });
        }
    </script>

</body>
</html>
